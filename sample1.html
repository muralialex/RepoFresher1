<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample HTML Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 10px 0;
            text-align: center;
        }
        section {
            padding: 20px;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Sample HTML Page</h1>
    </header>

    <section>
        <h2>About this page</h2>
        <p>This is a basic example of an HTML document. It includes a header, a section with some text, and a footer. The page uses internal CSS for styling.</p>
        <ul>
            <li>HTML Structure</li>
            <li>CSS Styling</li>
            <li>Responsive Design</li>
        </ul>
    </section>

    <footer>
        <p>&copy; 2025 My Website</p>
    </footer>
</body>
</html>
